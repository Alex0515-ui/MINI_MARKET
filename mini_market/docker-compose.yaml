services:
  db:
    image: postgres:15-alpine
    container_name: mini_market_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}       
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: mini_market_api
    ports:
      - "3000:3000"
    env_file:
      - .env                    
    environment:
      DB_HOST: db              
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data: